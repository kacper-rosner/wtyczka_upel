<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 15px; width: 340px; margin: 0; }
        .container { display: flex; flex-direction: column; gap: 12px; }
        button { padding: 8px; background: #38bdf8; border: none; color: white; cursor: pointer; transition: 0.2s; border-radius: 4px; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .toggle-container { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: bold; }
        h2 { margin: 0 0 10px 0; font-size: 16px; text-align: center; }
        #status { font-size: 12px; color: #16a34a; font-weight: bold; text-align: center; min-height: 15px; }
        #aiStatus { font-size: 12px; color: #64748b; font-weight: bold; text-align: center; margin-bottom: 5px; }
        .hidden { display: none !important; }
        #actionButtons { display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        #logsArea { background: #f1f5f9; padding: 10px; border-radius: 4px; font-size: 11px; white-space: pre-wrap; word-wrap: break-word; max-height: 200px; overflow-y: auto; }
        input[type="file"] { font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Ustawienia AI</h2>
        
        <div class="toggle-container">
            <input type="checkbox" id="enableContextToggle" />
            <label for="enableContextToggle">Włącz kontekst (PDF/PPTX)</label>
        </div>
        <div class="toggle-container">
            <input type="checkbox" id="knowledgeModeToggle" />
            <label for="knowledgeModeToggle">Tryb Knowledge</label>
        </div>
        <div class="toggle-container">
            <input type="checkbox" id="hideButtonsToggle" />
            <label for="hideButtonsToggle">Ukryj przyciski ładowania</label>
        </div>
        <div class="toggle-container">
            <input type="checkbox" id="hideLogsToggle" />
            <label for="hideLogsToggle">Ukryj logi i JSON</label>
        </div>

        <div id="actionButtons">
            <input type="file" id="fileInput" accept=".pdf,.pptx" disabled />
            <button id="saveBtn" disabled>Zapisz kontekst</button>
            <button id="clearBtn" disabled>Wyczyść</button>
            <div id="status"></div>
        </div>

        <div id="logsArea">
            <div id="aiStatus">Status AI: Brak danych</div>
            <div id="jsonOutput">Oczekiwanie na wynik...</div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
